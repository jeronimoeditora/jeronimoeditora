<!-- Popup de Newsletter Premium da Jerónimo Editora (Estilo Flutuante no Fundo) -->
<div id="ml-newsletter-popup" class="fixed bottom-6 right-6 left-6 sm:left-auto z-50 max-w-sm sm:max-w-md w-[calc(100%-3rem)] sm:w-full transform translate-y-20 opacity-0 pointer-events-none transition-all duration-700 ease-out">
    
    <!-- Cartão Flutuante -->
    <div id="ml-popup-card" class="bg-white rounded-2xl p-5 sm:p-8 shadow-2xl border border-brand-gold/30 relative font-inter">
        
        <!-- Botão para Fechar -->
        <button onclick="closeNewsletterPopup()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 p-1.5 rounded-full hover:bg-gray-50 transition-all" aria-label="Fechar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>

        <!-- Conteúdo do Formulário -->
        <div id="ml-popup-content">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 bg-[#fdfaf2] border border-brand-gold/30 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-brand-gold-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <div>
                    <span class="text-brand-gold-dark text-[10px] font-black uppercase tracking-widest block font-sans">Newsletter Oficial</span>
                    <h3 class="font-serif text-lg font-bold text-brand-accent-blue leading-none">Jerónimo & Hugo Bacelo</h3>
                </div>
            </div>
            
            <p class="text-xs text-gray-500 leading-relaxed mb-4">
                Receba gratuitamente as novidades dos nossos livros e os ensaios de formação teológica do Hugo Bacelo.
            </p>

            <form id="ml-popup-form" onsubmit="submitToMailerLite(event)" class="space-y-2">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="ml-field-name" placeholder="Nome (opcional)" class="w-full px-3 py-2 bg-brand-bg border border-gray-250 rounded-xl text-xs focus:outline-none focus:border-brand-accent-orange transition-all text-gray-700">
                    <input type="email" id="ml-field-email" required placeholder="O seu e-mail (obrigatório)" class="w-full px-3 py-2 bg-brand-bg border border-gray-250 rounded-xl text-xs focus:outline-none focus:border-brand-accent-orange transition-all text-gray-700">
                </div>
                
                <button type="submit" id="ml-submit-btn" class="w-full bg-brand-accent-orange hover:bg-brand-accent-blue text-white font-extrabold uppercase text-[10px] tracking-widest py-3 rounded-xl transition-all shadow-md hover:-translate-y-0.5 active:translate-y-0">
                    Quero Subscrever
                </button>
            </form>
        </div>

        <!-- Mensagem de Sucesso (Oculta por padrão) -->
        <div id="ml-popup-success" class="hidden text-center py-2">
            <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3 border border-emerald-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h4 class="font-serif text-lg font-bold text-brand-accent-blue mb-1">Inscrição Confirmada!</h4>
            <p class="text-xs text-gray-500 leading-relaxed mb-4">
                Muito obrigado por se juntar a nós. Em breve receberá o nosso primeiro e-mail!
            </p>
            <button onclick="closeNewsletterPopup()" class="px-5 py-2 bg-brand-accent-blue hover:bg-brand-accent-orange text-white text-[10px] font-bold uppercase tracking-wider rounded-xl transition-all">
                Fechar
            </button>
        </div>

    </div>
</div>

<script>
    // Configurações do MailerLite - Identificador da Conta e do Formulário
    const MAILERLITE_ACCOUNT_ID = "2468444"; 
    const MAILERLITE_FORM_ID = "1245638"; // Substitua este valor pelo seu ID longo obtido em embutidos (Passo 1 do guia)

    // Tempo de espera (em milissegundos) para o popup surgir de baixo (7 segundos)
    const DISPLAY_DELAY = 7000;

    // Função para abrir o Popup deslizando suavemente de baixo
    function openNewsletterPopup() {
        const isSubscribed = localStorage.getItem('jeronimo_ml_subscribed');
        const isClosed = localStorage.getItem('jeronimo_ml_closed_time');
        
        if (isSubscribed) return;

        if (isClosed) {
            const daysLimit = 15;
            const elapsedTime = Date.now() - parseInt(isClosed);
            const limitTime = daysLimit * 24 * 60 * 60 * 1000;
            if (elapsedTime < limitTime) return;
        }

        const popup = document.getElementById('ml-newsletter-popup');

        if (popup) {
            popup.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-20');
            popup.classList.add('opacity-100', 'translate-y-0');
        }
    }

    // Função para fechar o Popup com animação de descida
    window.closeNewsletterPopup = function() {
        const popup = document.getElementById('ml-newsletter-popup');

        if (popup) {
            popup.classList.remove('opacity-100', 'translate-y-0');
            popup.classList.add('opacity-0', 'pointer-events-none', 'translate-y-20');
            
            const alreadySubscribed = localStorage.getItem('jeronimo_ml_subscribed');
            if (!alreadySubscribed) {
                localStorage.setItem('jeronimo_ml_closed_time', Date.now().toString());
            }
        }
    };

    // Subscrição silenciosa para o MailerLite (Sem recarregar a página)
    window.submitToMailerLite = async function(event) {
        event.preventDefault();
        
        const emailInput = document.getElementById('ml-field-email');
        const nameInput = document.getElementById('ml-field-name');
        const submitBtn = document.getElementById('ml-submit-btn');

        if (!emailInput || !emailInput.value.trim()) return;

        const email = emailInput.value.trim();
        const name = nameInput ? nameInput.value.trim() : "";

        submitBtn.disabled = true;
        submitBtn.innerHTML = `<i class="fas fa-spinner animate-spin mr-2"></i> A processar...`;

        try {
            const formData = new FormData();
            formData.append('fields[email]', email);
            if (name) {
                formData.append('fields[name]', name);
            }

            const url = `https://assets.mailerlite.com/jsonp/${MAILERLITE_ACCOUNT_ID}/forms/${MAILERLITE_FORM_ID}/subscribe`;

            const response = await fetch(url, {
                method: 'POST',
                body: formData,
                mode: 'cors'
            });

            if (response.ok) {
                localStorage.setItem('jeronimo_ml_subscribed', 'true');
                localStorage.removeItem('jeronimo_ml_closed_time');

                const contentBlock = document.getElementById('ml-popup-content');
                const successBlock = document.getElementById('ml-popup-success');

                if (contentBlock && successBlock) {
                    contentBlock.classList.add('hidden');
                    successBlock.classList.remove('hidden');
                }
            } else {
                throw new Error("Erro na resposta do servidor.");
            }
        } catch (error) {
            console.error("Erro na subscrição:", error);
            alert("Ocorreu um problema ao registar a subscrição. Por favor, tente novamente.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `Quero Subscrever`;
        }
    };

    // Ativa o temporizador global para a abertura do popup
    setTimeout(openNewsletterPopup, DISPLAY_DELAY);
</script>
