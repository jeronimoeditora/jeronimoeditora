<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Finalizar Compra | Jerónimo Editora</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Roboto:wght@300;400;500;700;900&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Roboto"', 'sans-serif'],
                        lora: ['"Lora"', 'serif'],
                    },
                    colors: {
                        'brand-bg': '#F8F8F8', 
                        'brand-text': '#333333', 
                        'brand-accent-red': '#800000', 
                        'brand-accent-blue': '#002147', 
                        'brand-gold': '#cfaf5c', 
                    }
                }
            }
        }
    </script>

    <style>
        * { font-style: normal !important; }
        body { font-family: 'Roboto', sans-serif; color: #333333; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        .font-lora { font-family: 'Lora', serif; }

        input, select, textarea { font-size: 16px !important; font-family: 'Roboto', sans-serif; }
        input:focus, select:focus, textarea:focus {
            border-color: #800000 !important; 
            box-shadow: 0 0 0 2px rgba(128, 0, 0, 0.2);
        }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .payment-info-box {
            background-color: #f0f7ff;
            border: 1px solid #e0efff;
            border-radius: 0.75rem;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .radio-small { width: 1.2rem; height: 1.2rem; cursor: pointer; }

        .btn-attach {
            background-color: #001f3f;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            cursor
