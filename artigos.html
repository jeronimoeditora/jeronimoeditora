        // --- MOTOR DE PESQUISA, FILTRAGEM E ORDENAÇÃO DINÂMICA ---
        function filterArticles() {
            const searchTerm = document.getElementById('article-search').value.toLowerCase().trim();
            const selectedCategory = document.getElementById('category-select').value;
            const selectedSort = document.getElementById('sort-select').value;
            
            let filtered = articlesData.filter(art => {
                const matchesSearch = art.title.toLowerCase().includes(searchTerm) || 
                                      art.category.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || art.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            // Ordenação
            if (selectedSort === 'az') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else if (selectedSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (selectedSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            }

            renderArticles(filtered);
            fetchReadingTimes(); // Tenta ler e recalcular os tempos de leitura reais
        }

        // --- RENDERIZAÇÃO DOS CARTÕES DE ARTIGOS ---
        function renderArticles(articles) {
            const grid = document.getElementById('articles-grid');
            const noResults = document.getElementById('no-results');
            
            grid.innerHTML = '';
            
            if (articles.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            
            articles.forEach(art => {
                // Conversão de data simples
                const dateObj = new Date(art.date);
                const formattedDate = dateObj.toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
                
                // Configuração do gatilho de link direto no separador ou aviso de brevemente
                const linkAction = art.url !== '#' 
                    ? `href="${art.url}"` 
                    : `href="javascript:void(0)" onclick="triggerToastNotice()"`;

                // Espaço de foto horizontal dinâmico por baixo da data e tempo de leitura tornados clicáveis
                let imageHtml = '';
                if (art.image) {
                    imageHtml = `
                        <a ${linkAction} class="block w-full h-32 sm:h-36 overflow-hidden rounded-2xl bg-gray-100 border border-gray-150 mb-4 relative cursor-pointer">
                            <img src="${art.image}" alt="${art.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" onerror="this.onerror=null; this.src='https://placehold.co/600x335/f8f8f8/002147?text=Jer%C3%B3nimo+Editora';">
                        </a>
                    `;
                } else {
                    imageHtml = `
                        <a ${linkAction} class="block w-full h-32 sm:h-36 overflow-hidden rounded-2xl bg-gray-50 border border-gray-150 mb-4 flex flex-col items-center justify-center text-center cursor-pointer">
                            <i class="fas fa-book-open text-gray-200 text-3xl mb-1.5"></i>
                            <span class="text-[9px] uppercase tracking-widest font-black text-gray-400">Brevemente</span>
                        </a>
                    `;
                }

                grid.innerHTML += `
                    <div class="article-card bg-white p-6 rounded-3xl border border-gray-150 shadow-xs flex flex-col justify-between">
                        <div>
                            <!-- Categoria -->
                            <span class="text-brand-accent-orange text-[10px] font-extrabold uppercase tracking-widest block mb-3 font-sans">${art.category}</span>
                            
                            <!-- Título com excelente legibilidade -->
                            <h3 class="font-sans text-lg sm:text-xl font-bold text-brand-accent-blue leading-snug mb-3 hover:text-brand-accent-orange transition-colors duration-200">
                                <a ${linkAction}>${art.title}</a>
                            </h3>
                            
                            <!-- Data e Tempo de Leitura unificados na mesma linha -->
                            <span class="text-xs text-gray-450 font-sans block mb-4 font-medium flex flex-wrap items-center gap-1.5">
                                <i class="far fa-calendar text-gray-400"></i> ${formattedDate}
                                <span class="text-gray-300">|</span>
                                <span id="reading-time-wrapper-${art.id}" class="inline-flex items-center gap-1">
                                    <i class="far fa-clock text-gray-400"></i> <span id="time-val-${art.id}">${art.readingTime}</span> de leitura
                                </span>
                            </span>

                            <!-- FOTO HORIZONTAL TOTALMENTE CLICÁVEL -->
                            ${imageHtml}
                        </div>
                        
                        <!-- Link de Leitura Direto -->
                        <div class="pt-5 border-t border-gray-100 mt-2 flex justify-between items-center">
                            <a ${linkAction} class="text-xs text-brand-accent-blue font-extrabold uppercase tracking-widest flex items-center gap-1.5 hover:text-brand-accent-orange transition-colors font-sans">
                                Ler Artigo <i class="fas fa-chevron-right text-[10px] text-brand-accent-orange"></i>

        // --- MOTOR DIPLOMÁTICO PARA OBTER O TEMPO DE LEITURA DIRETAMENTE DOS ARTIGOS COMPLETOS ---
        async function fetchReadingTimes() {
            for (let art of articlesData) {
                if (art.url && art.url !== '#') {
                    try {
                        const response = await fetch(getSafePath(art.url));
                        if (response.ok) {
                            const htmlText = await response.text();
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, 'text/html');
                            const contentEl = doc.getElementById('article-content') || doc.querySelector('article') || doc.body;
                            if (contentEl) {
                                const text = contentEl.innerText || contentEl.textContent;
                                const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                                // 200 palavras por minuto como média de conforto no ecrã
                                const computedTime = Math.ceil(words / 200);
                                
                                // Atualiza os dados na memória local
                                art.readingTime = `${computedTime} min`;
                                
                                // Atualiza dinamicamente o elemento no DOM
                                const badge = document.getElementById(`time-val-${art.id}`);
                                if (badge) {
                                    badge.textContent = `${computedTime} min`;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`Tempo de leitura dinâmico indisponível localmente para: ${art.title}. Revertendo para padrão de segurança.`);
                        // Mantém o valor pré-definido seguro (10 min para Pentecostes)
                        const badge = document.getElementById(`time-val-${art.id}`);
                        if (badge && (badge.textContent === "Calculando..." || badge.textContent === "x min")) {
                            badge.textContent = art.id === 14 ? "10 min" : "4 min";
                        }
                    }
                }
            }
        }

        // --- SISTEMA DE NOTIFICAÇÃO PARA ARTIGOS BREVEMENTE ---
        let toastTimeout;
        function triggerToastNotice() {
            const toast = document.getElementById('toast-notice');
            if (!toast) return;

            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // Limpa todos os filtros ativos
        function clearFilters() {
            document.getElementById('article-search').value = '';
            document.getElementById('category-select').value = 'all';
            document.getElementById('sort-select').value = 'date-desc';
            filterArticles();
        }

        // --- SISTEMA DE COMPONENTES DINÂMICO (MENU E RODAPÉ) ---
        function getSafePath(file) {
            const currentUrl = window.location.href;
            if (currentUrl.startsWith('blob:') || currentUrl.startsWith('file:')) return file; 
            try { 
                const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                return new URL(file, baseUrl).href; 
            } catch (e) { return file; }
        }

        // Carrega dinamicamente os componentes menu e rodapé, suportando com e sem extensão .html
        async function loadComponents() {
            try {
                // Tenta carregar menu
                let navResp = await fetch(getSafePath('menu') + '?v=1.0.2');
                if (!navResp.ok) {
                    navResp = await fetch(getSafePath('menu.html') + '?v=1.0.2');
                }
                if (navResp.ok) {
                    document.getElementById('nav-placeholder').innerHTML = await navResp.text();
                }

                // Tenta carregar rodapé
                let footResp = await fetch(getSafePath('rodape') + '?v=1.0.2');
                if (!footResp.ok) {
                    footResp = await fetch(getSafePath('rodape.html') + '?v=1.0.2');
                }
                if (footResp.ok) {
                    document.getElementById('footer-placeholder').innerHTML = await footResp.text();
                }
                updateCartUI();
            } catch (e) { 
                console.warn("Modo offline."); 
            }
        }

        function updateCartUI() {
            const items = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const total = items.reduce((s, i) => s + i.quantity, 0);
            document.querySelectorAll('#cart-count, #cart-count-mobile').forEach(el => {
                if (el) { 
                    el.textContent = total; 
                    el.classList.toggle('opacity-0', total === 0); 
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
            filterArticles(); // Garante a ordenação automática por "Mais Recentes" no arranque
        });
    </script>
