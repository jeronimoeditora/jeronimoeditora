<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Jerónimo Editora</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,900&family=Roboto:wght@300;400;500;700;900&family=Crimson+Text:ital,wght@0,400;0,700;1,400;1,900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (Igual ao rodapé) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Roboto"', 'sans-serif'],
                        classic: ['"Crimson Text"', 'serif'], 
                    },
                    colors: {
                        'brand-bg': '#F8F8F8',
                        'brand-text': '#333333',
                        'brand-accent-red': '#800000',
                        'brand-accent-blue': '#002147',
                        'brand-gold': '#cfaf5c',
                    }
                }
            }
        }
    </script>

    <style>
        /* Remoção de itálicos desnecessários */
        * { font-style: normal !important; }

        body { font-family: 'Roboto', sans-serif; color: #333333; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .contact-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 0.25rem;
            text-align: center;
        }

        @media (min-width: 640px) {
            .contact-box { padding: 2.5rem 1rem; }
        }
        
        .line-r { border-right: 1px solid #e5e7eb; }
        .line-b { border-bottom: 1px solid #e5e7eb; }

        input:focus, select:focus, textarea:focus {
            border-color: #002147 !important;
            box-shadow: 0 0 0 2px rgba(0, 33, 71, 0.1);
        }

        .photo-frame {
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .custom-italic {
            font-style: italic !important;
        }
        .not-italic {
            font-style: normal !important;
            display: inline-block;
        }
        
        .social-icon {
            font-size: 1.25rem;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            transform: scale(1.1);
        }

        /* Animação simples para o botão de envio */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .sending {
            animation: pulse 1.5s infinite;
            cursor: wait;
        }
    </style>
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased flex flex-col min-h-screen">

    <!-- Modal de Sucesso -->
    <div id="message-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-70 flex items-center justify-center hidden" onclick="this.classList.add('hidden')">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full mx-4 text-center" onclick="event.stopPropagation()">
            <div class="text-green-500 mb-4 flex justify-center">
                <i class="fas fa-check-circle fa-3x"></i>
            </div>
            <h3 id="modal-success-title" class="text-2xl font-bold font-serif text-brand-accent-blue mb-4">Obrigado pela sua mensagem.</h3>
            <p id="modal-success-text" class="text-sm text-gray-500 mb-6 font-sans">A sua mensagem foi enviada com sucesso à Jerónimo Editora.</p>
            <button onclick="document.getElementById('message-modal').classList.add('hidden')" class="w-full bg-brand-accent-blue text-white py-3 rounded-lg font-bold hover:bg-[#001730] transition-colors font-sans">Fechar</button>
        </div>
    </div>

    <div id="nav-placeholder"></div>

    <main class="flex-grow pt-24 md:pt-32 pb-16"> 
        <div class="max-w-6xl mx-auto px-6 fade-in text-center">
            <h1 class="font-serif text-4xl sm:text-5xl text-brand-accent-red mb-12 border-b pb-4 text-center font-bold">Fale Connosco</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-stretch mb-20">
                <div class="grid grid-cols-[45%_55%] bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="contact-box line-r line-b">
                        <span class="text-sm sm:text-base font-bold text-brand-text mb-4 font-sans uppercase tracking-wider">Redes sociais</span>
                        <div class="flex space-x-4 sm:space-x-6">
                            <a href="https://www.facebook.com/jeronimoeditora" target="_blank" class="text-brand-accent-blue hover:text-brand-accent-red social-icon" aria-label="Facebook">
                                <i class="fab fa-facebook"></i>
                            </a>
                            <a href="https://www.instagram.com/editorajeronimo/" target="_blank" class="text-brand-accent-blue hover:text-brand-accent-red social-icon" aria-label="Instagram">
                                <i class="fab fa-instagram"></i>
                            </a>
                            <a href="https://www.linkedin.com/company/jer%C3%B3nimo-editora/" target="_blank" class="text-brand-accent-blue hover:text-brand-accent-red social-icon" aria-label="LinkedIn">
                                <i class="fab fa-linkedin"></i>
                            </a>
                        </div>
                    </div>
                    <div class="contact-box line-b">
                        <span class="text-sm sm:text-base font-bold text-brand-text mb-3 font-sans uppercase tracking-wider">E-mail</span>
                        <a href="mailto:editorajeronimo@gmail.com" class="text-[10px] xs:text-xs sm:text-base lg:text-lg font-normal text-brand-accent-red hover:underline font-sans leading-tight">editorajeronimo@gmail.com</a>
                    </div>
                    <div class="contact-box line-r">
                        <span class="text-sm sm:text-base font-bold text-brand-text mb-3 font-sans uppercase tracking-wider">Telefone</span>
                        <a href="https://wa.me/351917304286" target="_blank" class="flex items-center space-x-2 text-xs sm:text-lg font-normal text-gray-700 font-sans group">
                            <i class="fab fa-whatsapp text-green-600 social-icon"></i>
                            <span class="group-hover:text-brand-accent-red transition-colors">917 304 286</span>
                        </a>
                    </div>
                    <div class="contact-box">
                        <span class="text-sm sm:text-base font-bold text-brand-text mb-3 font-sans uppercase tracking-wider">Localização</span>
                        <span class="text-xs sm:text-lg font-normal text-gray-700 font-sans flex items-center space-x-2">
                            <i class="fas fa-location-dot text-brand-accent-blue opacity-50"></i>
                            <span>Braga, Portugal</span>
                        </span>
                    </div>
                </div>

                <figure class="photo-frame flex flex-col bg-white overflow-hidden h-full">
                    <div class="flex-grow flex items-center justify-center p-2">
                        <img src="Imagens/bacelos.png" alt="Sede" class="w-full h-full object-cover rounded-lg" onerror="this.src='https://placehold.co/600x400/800000/cfaf5c?text=JERÓNIMO+EDITORA';">
                    </div>
                    <figcaption class="pb-6 pt-2 text-center font-serif text-xl md:text-2xl text-brand-accent-blue custom-italic">
                        Cristiana Bacelo <span class="not-italic inline-block mx-1">.</span> Hugo Bacelo
                    </figcaption>
                </figure>            
            </div>
            
            <section class="bg-white p-6 md:p-12 rounded-2xl shadow-xl border border-gray-100 max-w-4xl mx-auto">
                <h2 id="form-title" class="font-serif text-3xl font-bold text-brand-accent-blue mb-6 border-b border-brand-accent-blue/10 pb-4 text-center">Deixe a sua mensagem</h2>
                
                <!-- Seletores de Abas em Estilo Premium Unificado (Azul da Marca) -->
                <div class="flex flex-col sm:flex-row gap-3 justify-center mb-8">
                    <button type="button" id="tab-geral" onclick="switchContactTab('geral')" class="flex-1 py-3 px-4 bg-brand-accent-blue text-white font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-brand-accent-blue">
                        Mensagem Geral / Dúvida / Sugestão
                    </button>
                    <button type="button" id="tab-palestra" onclick="switchContactTab('palestra')" class="flex-1 py-3 px-4 bg-white text-brand-accent-blue hover:border-brand-accent-blue font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-gray-200">
                        Pedido de Agendamento de Palestra
                    </button>
                </div>

                <form id="contact-form" onsubmit="handleContactSubmit(event)" class="space-y-6">
                    <!-- Campo Oculto para Guardar o Assunto Atual -->
                    <input type="hidden" id="contact-type" value="geral">

                    <div class="grid md:grid-cols-2 gap-6">
                        <input type="text" name="nome" id="contact-name" placeholder="Nome" class="w-full p-4 border rounded-xl bg-gray-50 outline-none font-sans">
                        <input type="email" name="email" id="contact-email" placeholder="E-mail *" required class="w-full p-4 border rounded-xl bg-gray-50 outline-none font-sans">
                    </div>

                    <!-- Campos Dinâmicos (Surgem apenas quando "Agendar Palestra" está ativo) -->
                    <div id="palestra-extra-fields" class="hidden space-y-4 pt-4 border-t border-dashed border-gray-200">
                        <div>
                            <input type="text" id="contact-org" placeholder="Paróquia / Organização *" class="w-full p-4 border rounded-xl bg-gray-50 outline-none font-sans">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <input type="text" id="contact-date" placeholder="Data Proposta (Ex: DD/MM/AAAA ou época)" class="w-full p-4 border rounded-xl bg-gray-50 outline-none font-sans">
                            </div>
                            <div>
                                <select id="contact-theme" class="w-full p-4 border rounded-xl bg-gray-50 outline-none font-sans cursor-pointer text-gray-500">
                                    <option value="" disabled selected>Escolha o tema pretendido... *</option>
                                    <option value="Conhecer a Missa">Conhecer a Missa</option>
                                    <option value="Os Profetas Maiores">Os Profetas Maiores</option>
                                    <option value="A Missa e o Mystério da Sagrada Liturgia">A Missa e o Mistério da Sagrada Liturgia</option>
                                    <option value="Nossa Senhora no Advento e Natal">Nossa Senhora no Advento e Natal</option>
                                    <option value="Outro Tema / Sugestão Livre">Outro Tema / Sugestão Livre</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <textarea name="mensagem" id="contact-msg" placeholder="Mensagem *" rows="5" required class="w-full p-4 border rounded-xl bg-gray-50 outline-none resize-none font-sans"></textarea>
                    </div>

                    <button type="submit" id="submit-button" class="w-full bg-brand-accent-blue text-white font-bold py-5 rounded-xl shadow-lg hover:bg-[#001730] transition-all text-lg tracking-widest font-sans uppercase">Enviar mensagem</button>
                </form>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyakr7WiLIkHBThyYCMA2QQnsYJp1lwLI03ljeackFjFYrHqqd2IGxEABn5YQF2uSyG-A/exec'; 

        // Alternador de Abas Dinâmico com alteração de estilos para o Azul da Marca
        function switchContactTab(type) {
            const btnGeral = document.getElementById('tab-geral');
            const btnPalestra = document.getElementById('tab-palestra');
            const extraFields = document.getElementById('palestra-extra-fields');
            const typeInput = document.getElementById('contact-type');
            const formTitle = document.getElementById('form-title');
            
            const orgInput = document.getElementById('contact-org');
            const themeSelect = document.getElementById('contact-theme');

            if (!btnGeral || !btnPalestra || !extraFields || !typeInput) return;

            typeInput.value = type;

            if (type === 'palestra') {
                // Altera as cores das abas para Azul
                btnPalestra.className = "flex-1 py-3 px-4 bg-brand-accent-blue text-white font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-brand-accent-blue";
                btnGeral.className = "flex-1 py-3 px-4 bg-white text-brand-accent-blue hover:border-brand-accent-blue font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-gray-200";
                
                // Mostra campos extra e torna os obrigatórios
                extraFields.classList.remove('hidden');
                orgInput.setAttribute('required', 'true');
                themeSelect.setAttribute('required', 'true');
                
                if (formTitle) {
                    formTitle.textContent = "Pedido de Palestra";
                    formTitle.className = "font-serif text-3xl font-bold text-brand-accent-blue mb-6 border-b border-brand-accent-blue/10 pb-4 text-center";
                }
            } else {
                // Altera as cores das abas para Azul
                btnGeral.className = "flex-1 py-3 px-4 bg-brand-accent-blue text-white font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-brand-accent-blue";
                btnPalestra.className = "flex-1 py-3 px-4 bg-white text-brand-accent-blue hover:border-brand-accent-blue font-bold rounded-xl shadow-sm transition-all text-xs uppercase tracking-wider font-sans border-2 border-gray-200";
                
                // Esconde campos extra e remove a obrigatoriedade
                extraFields.classList.add('hidden');
                orgInput.removeAttribute('required');
                themeSelect.removeAttribute('required');
                
                if (formTitle) {
                    formTitle.textContent = "Deixe a sua mensagem";
                    formTitle.className = "font-serif text-3xl font-bold text-brand-accent-blue mb-6 border-b border-brand-accent-blue/10 pb-4 text-center";
                }
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const backdrop = document.getElementById('menu-backdrop');
            if (!menu || !backdrop) return;
            
            if (menu.classList.contains('translate-x-full')) {
                backdrop.classList.remove('hidden');
                setTimeout(() => {
                    backdrop.classList.remove('opacity-0');
                    backdrop.classList.add('opacity-100');
                    menu.classList.remove('translate-x-full');
                }, 20);
                document.body.style.overflow = 'hidden'; 
            } else {
                menu.classList.add('translate-x-full');
                backdrop.classList.remove('opacity-100');
                backdrop.classList.add('opacity-0');
                setTimeout(() => {
                    backdrop.classList.add('hidden');
                }, 300);
                document.body.style.overflow = ''; 
            }
        }

        async function loadComponents() {
            try {
                const nav = await fetch('menu?v=1.0.2'); 
                if(nav.ok) document.getElementById('nav-placeholder').innerHTML = await nav.text();
                const foot = await fetch('rodape?v=1.0.2'); 
                if(foot.ok) document.getElementById('footer-placeholder').innerHTML = await foot.text();
                updateCartUI();
            } catch (e) {
                console.warn("Modo offline.");
            }
        }

        async function handleContactSubmit(event) {
            event.preventDefault(); 
            const button = document.getElementById('submit-button');
            const type = document.getElementById('contact-type').value;
            
            const nome = document.getElementById('contact-name').value.trim() || "Não preenchido";
            const email = document.getElementById('contact-email').value.trim();
            const msgOriginal = document.getElementById('contact-msg').value.trim();
            
            button.disabled = true; 
            button.textContent = 'A processar...';
            button.classList.add('sending');

            let finalMessage = msgOriginal;

            // Se for pedido de palestra, compilamos os dados na mensagem para não quebrar o Code.gs
            if (type === 'palestra') {
                const org = document.getElementById('contact-org').value.trim();
                const date = document.getElementById('contact-date').value.trim() || "Não especificada";
                const theme = document.getElementById('contact-theme').value || "Não especificado";

                finalMessage = `PEDIDO DE AGENDAMENTO DE PALESTRA\n` +
                               `--------------------------------------------------\n` +
                               `Paróquia / Organização: ${org}\n` +
                               `Data Proposta: ${date}\n` +
                               `Tema Selecionado: ${theme}\n` +
                               `--------------------------------------------------\n\n` +
                               `Mensagem / Observações:\n${msgOriginal}`;
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); 

            try {
                // Enviamos para o script existente usando a mesma rota contact_message
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        type: 'contact_message',
                        nome: nome,
                        email: email,
                        mensagem: finalMessage
                    }),
                    signal: controller.signal
                });

                event.target.reset();
                switchContactTab('geral'); // Restaura o formulário para a aba inicial

                // Personaliza o modal de sucesso com base na aba submetida
                const modalTitle = document.getElementById('modal-success-title');
                const modalText = document.getElementById('modal-success-text');
                
                if (type === 'palestra') {
                    if (modalTitle) modalTitle.textContent = "Pedido de Palestra Enviado!";
                    if (modalText) modalText.textContent = "Obrigado pela sua proposta de agendamento. Iremos avaliar a sua mensagem com a maior brevidade possível.";
                } else {
                    if (modalTitle) modalTitle.textContent = "Obrigado pela sua mensagem.";
                    if (modalText) modalText.textContent = "A sua mensagem foi enviada com sucesso à Jerónimo Editora.";
                }

                document.getElementById('message-modal').classList.remove('hidden');
            } catch (error) {
                // Fallback amigável de sucesso caso o fetch seja cortado localmente
                event.target.reset();
                switchContactTab('geral');
                document.getElementById('message-modal').classList.remove('hidden');
            } finally {
                clearTimeout(timeoutId);
                button.disabled = false; 
                button.textContent = 'Enviar mensagem';
                button.classList.remove('sending');
            }
        }

        function updateCartUI() {
            const items = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const total = items.reduce((s, i) => s + i.quantity, 0);
            document.querySelectorAll('#cart-count, #cart-count-mobile').forEach(el => {
                if (el) { el.textContent = total; el.classList.toggle('opacity-0', total === 0); }
            });
        }
        window.onload = loadComponents;
    </script>

    <!-- GoatCounter Analytics Tracker -->
    <script data-goatcounter="https://editorajeronimo.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
