<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Arquivo de Artigos | Jerónimo Editora</title>
    
    <!-- Favicons e Ícones (Desktop, Mobile e Apple) - Com parâmetro para evitar Cache -->
    <link rel="icon" type="image/png" sizes="32x32" href="Imagens/favicon.png?v=1.0.0">
    <link rel="icon" type="image/png" sizes="16x16" href="Imagens/favicon.png?v=1.0.0">
    <link rel="apple-touch-icon" sizes="180x180" href="Imagens/favicon.png?v=1.0.0">
    <link rel="shortcut icon" href="Imagens/favicon.png?v=1.0.0">

    <script>
        // Limpeza estética do URL removendo a extensão .html na barra de pesquisa (GitHub Pages)
        if (window.location.pathname.endsWith('.html')) {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname.replace(/\.html$/, '') + window.location.search + window.location.hash;
            window.history.replaceState(null, '', cleanUrl);
        }
    </script>
    
    <!-- GoatCounter Analytics -->
    <script data-goatcounter="https://editorajeronimo.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

    <!-- Google Fonts unificadas com suporte completo a pesos e itálicos de Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Roboto"', 'sans-serif'], // Menu e rodapé em Roboto unificado
                        inter: ['"Inter"', 'sans-serif'], // Conteúdo de leitura em Inter premium
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        'brand-bg': '#F8F8F8',
                        'brand-text': '#2d3748',
                        'brand-accent-red': '#800000',
                        'brand-accent-blue': '#002147',
                        'brand-accent-orange': '#e05300',
                        'brand-gold': '#cfaf5c',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Roboto', sans-serif; color: #2d3748; background-color: #F8F8F8; }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .article-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 33, 71, 0.15);
        }
    </style>
</head>
<body class="bg-brand-bg text-brand-text antialiased flex flex-col min-h-screen">

    <!-- CONTENTOR DO MENU DINÂMICO (Carregado do GitHub) -->
    <div id="nav-placeholder"></div>

    <main class="flex-grow pt-28 md:pt-36 pb-16 font-inter">
        <div class="max-w-6xl mx-auto px-6 fade-in">
            
            <!-- Título Principal do Arquivo de Artigos -->
            <div class="text-center mb-10">
                <span class="text-brand-accent-orange text-xs uppercase font-extrabold tracking-widest block mb-2">Escritos & Formação</span>
                <h1 class="font-serif text-3xl sm:text-5xl font-bold text-brand-accent-blue leading-tight mb-4">Arquivo de Artigos</h1>
                <p class="font-sans text-gray-500 max-w-2xl mx-auto text-base sm:text-lg font-medium">"Investigar com paciência, crer com convicção e reter com sabedoria."</p>
                <div class="h-1 w-16 bg-brand-accent-orange mx-auto mt-4"></div>
            </div>

            <!-- Painel de Pesquisa e Filtros -->
            <div class="bg-white p-4 sm:p-6 rounded-2xl border border-gray-150 shadow-xs max-w-4xl mx-auto mb-12">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-12 gap-4 items-center">
                    
                    <div class="lg:col-span-5 relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                            <i class="fas fa-search text-gray-400 text-sm"></i>
                        </span>
                        <input type="text" id="article-search" onkeyup="filterArticles()" placeholder="Pesquise artigos por palavra-chave..." class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-brand-accent-orange transition-all font-sans">
                    </div>
                    
                    <div class="lg:col-span-3">
                        <select id="category-select" onchange="filterArticles()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-brand-accent-orange transition-all font-sans cursor-pointer text-gray-700">
                            <option value="all">Todas as Categorias</option>
                            <option value="Apologética e Cultura">Apologética e Cultura</option>
                            <option value="Comentários às Leituras">Comentários às Leituras</option>
                            <option value="Crítica de Livros">Crítica de Livros</option>
                            <option value="Liturgia">Liturgia</option>
                            <option value="Resposta a Artigos">Resposta a Artigos</option>
                        </select>
                    </div>

                    <div class="lg:col-span-2">
                        <select id="sort-select" onchange="filterArticles()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-brand-accent-orange transition-all font-sans cursor-pointer text-gray-700">
                            <option value="date-desc">Mais Recentes</option>
                            <option value="date-asc">Mais Antigos</option>
                            <option value="az">Título A-Z</option>
                            <option value="time-asc">Tempo Leitura (Crescente)</option>
                            <option value="time-desc">Tempo Leitura (Decrescente)</option>
                        </select>
                    </div>

                    <div class="lg:col-span-2">
                        <button onclick="clearFilters()" class="w-full bg-brand-accent-blue text-white hover:bg-brand-accent-orange font-bold text-xs uppercase py-3.5 rounded-xl transition-all tracking-wider font-sans">
                            Limpar
                        </button>
                    </div>

                </div>
            </div>

            <!-- Sem resultados -->
            <div id="no-results" class="hidden text-center py-16">
                <i class="fas fa-book-open text-gray-300 text-5xl mb-4"></i>
                <h3 class="font-serif text-2xl text-brand-accent-blue font-bold">Nenhum artigo encontrado</h3>
                <p class="text-gray-500 font-sans mt-1">Experimente alterar os termos de pesquisa ou os filtros seleccionados.</p>
            </div>

            <!-- Grelha de Artigos -->
            <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Preenchido dinamicamente por Javascript -->
            </div>

        </div>
    </main>

    <!-- Notificação Flutuante Premium -->
    <div id="toast-notice" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-500 ease-out max-w-sm w-[90%] sm:w-full bg-white rounded-2xl shadow-2xl border border-brand-accent-blue/10 p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-[#ecf3fa] flex items-center justify-center text-brand-accent-blue flex-shrink-0">
            <i class="fas fa-info-circle text-lg"></i>
        </div>
        <div class="flex-grow">
            <p class="text-xs text-brand-accent-blue font-bold uppercase tracking-wider">Aviso de Disponibilidade</p>
            <p class="text-sm text-gray-650 font-medium font-sans">Este artigo estará disponível online brevemente.</p>
        </div>
    </div>

    <!-- CONTENTOR DO RODAPÉ DINÂMICO (Carregado do GitHub) -->
    <div id="footer-placeholder"></div>

    <script>
        // Base de dados contendo os 8 artigos, ordenados por data de forma decrescente
        // Todos os tempos de leitura de fallback foram mapeados para bater certo com a contagem exata de palavras de cada artigo
        const articlesData = [
            {
                id: 8,
                title: "O coração que arde contra o arco-íris roubado",
                category: "Apologética e Cultura",
                date: "2026-06-13",
                readingTime: "10 min",
                url: "artigos-individuais/o-coracao-que-arde-contra-o-arco-iris-roubado",
                image: "Imagens/8.png"
            },
            {
                id: 7,
                title: "Breve Guia para a Santa Missa (Parte 1 de 2)",
                category: "Liturgia",
                date: "2026-06-11",
                readingTime: "7 min",
                url: "artigos-individuais/breve-guia-para-a-santa-missa-parte-1-de-2",
                image: "Imagens/7.png"
            },
            {
                id: 6,
                title: "A Coroação da História da Salvação (Pentecostes)",
                category: "Comentários às Leituras",
                date: "2026-05-24",
                readingTime: "8 min",
                url: "artigos-individuais/a-coroacao-da-historia-da-salvacao-pentecostes",
                image: "Imagens/6.png"
            },
            {
                id: 5,
                title: "Engolido por uma má exegese",
                category: "Resposta a Artigos",
                date: "2026-04-23",
                readingTime: "22 min", // Corrigido estaticamente para 22 min!
                url: "artigos-individuais/engolido-por-uma-ma-exegese",
                image: "Imagens/5.png"
            },
            {
                id: 4,
                title: "Nascimento de Jesus: Belém ou Nazaré?",
                category: "Resposta a Artigos",
                date: "2026-02-03",
                readingTime: "10 min", // Corrigido estaticamente para 10 min!
                url: "artigos-individuais/nascimento-de-jesus-belem-ou-nazare",
                image: "Imagens/4.png"
            },
            {
                id: 3,
                title: "Como Não Ler a Bíblia em Qualquer Século (3 de 3)",
                category: "Crítica de Livros",
                date: "2025-09-24",
                readingTime: "11 min", // Corrigido estaticamente para 11 min!
                url: "artigos-individuais/como-nao-ler-a-biblia-em-qualquer-seculo-3-de-3",
                image: "Imagens/3.png"
            },
            {
                id: 2,
                title: "Como Não Ler a Bíblia em Qualquer Século (2 de 3)",
                category: "Crítica de Livros",
                date: "2025-09-10",
                readingTime: "21 min", // Corrigido estaticamente para 21 min!
                url: "artigos-individuais/como-nao-ler-a-biblia-em-qualquer-seculo-2-de-3",
                image: "Imagens/2.png"
            },
            {
                id: 1,
                title: "Como Não Ler a Bíblia em Qualquer Século (1 de 3)",
                category: "Crítica de Livros",
                date: "2025-08-27",
                readingTime: "9 min", // Corrigido estaticamente para 9 min!
                url: "artigos-individuais/como-nao-ler-a-biblia-em-qualquer-seculo-1-de-3",
                image: "Imagens/1.png"
            }
        ];

        // Função local para garantir o controlo de abertura e fecho do menu dinâmico no telemóvel
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const backdrop = document.getElementById('menu-backdrop');
            if (!menu || !backdrop) return;
            
            if (menu.classList.contains('translate-x-full')) {
                backdrop.classList.remove('hidden');
                setTimeout(() => {
                    backdrop.classList.remove('opacity-0');
                    backdrop.classList.add('opacity-100');
                    menu.classList.remove('translate-x-full');
                }, 20);
                document.body.style.overflow = 'hidden'; 
            } else {
                menu.classList.add('translate-x-full');
                backdrop.classList.remove('opacity-100');
                backdrop.classList.add('opacity-0');
                setTimeout(() => {
                    backdrop.classList.add('hidden');
                }, 300);
                document.body.style.overflow = ''; 
            }
        }

        // Filtra e ordena a visualização de artigos com base na pesquisa e critérios de ordenação
        function filterArticles() {
            const searchTerm = document.getElementById('article-search').value.toLowerCase().trim();
            const selectedCategory = document.getElementById('category-select').value;
            const selectedSort = document.getElementById('sort-select').value;
            
            let filtered = articlesData.filter(art => {
                const matchesSearch = art.title.toLowerCase().includes(searchTerm) || 
                                      art.category.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || art.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if (selectedSort === 'az') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else if (selectedSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (selectedSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (selectedSort === 'time-asc') {
                filtered.sort((a, b) => parseInt(a.readingTime) - parseInt(b.readingTime));
            } else if (selectedSort === 'time-desc') {
                filtered.sort((a, b) => parseInt(b.readingTime) - parseInt(a.readingTime));
            }

            renderArticles(filtered);
        }

        // Renderiza visualmente o HTML dos artigos na grelha
        function renderArticles(articles) {
            const grid = document.getElementById('articles-grid');
            const noResults = document.getElementById('no-results');
            if (!grid) return;
            grid.innerHTML = '';
            
            if (articles.length === 0) {
                if (noResults) noResults.classList.remove('hidden');
                return;
            }
            if (noResults) noResults.classList.add('hidden');
            
            articles.forEach(art => {
                const dateObj = new Date(art.date);
                const formattedDate = dateObj.toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
                const linkAction = art.url !== '#' 
                    ? `href="${art.url}"` 
                    : `href="javascript:void(0)" onclick="triggerToastNotice()"` ;

                let imageHtml = '';
                if (art.image) {
                    imageHtml = `
                        <a ${linkAction} class="block w-full h-32 sm:h-36 overflow-hidden rounded-2xl bg-gray-100 border border-gray-150 mb-4 relative cursor-pointer">
                            <img src="${art.image}" alt="${art.title}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://placehold.co/600x335/f8f8f8/002147?text=Jer%C3%B3nimo+Editora';">
                        </a>
                    `;
                } else {
                    imageHtml = `
                        <a ${linkAction} class="block w-full h-32 sm:h-36 overflow-hidden rounded-2xl bg-gray-50 border border-gray-150 mb-4 flex flex-col items-center justify-center text-center cursor-pointer">
                            <i class="fas fa-book-open text-gray-200 text-3xl mb-1.5"></i>
                            <span class="text-[9px] uppercase tracking-widest font-black text-gray-400 font-inter">Brevemente</span>
                        </a>
                    `;
                }

                grid.innerHTML += `
                    <div class="article-card bg-white p-6 rounded-3xl border border-gray-150 shadow-xs flex flex-col justify-between">
                        <div>
                            <span class="text-brand-accent-orange text-[10px] font-extrabold uppercase tracking-widest block mb-3 font-inter">${art.category}</span>
                            <h3 class="font-inter text-lg sm:text-xl font-bold text-brand-accent-blue leading-snug mb-3 hover:text-brand-accent-orange transition-colors duration-200">
                                <a ${linkAction}>${art.title}</a>
                            </h3>
                            <span class="text-xs text-gray-400 font-inter block mb-4 font-medium flex flex-wrap items-center gap-1.5">
                                <i class="far fa-calendar text-gray-400"></i> ${formattedDate}
                                <span class="text-gray-300">|</span>
                                <span class="inline-flex items-center gap-1">
                                    <i class="far fa-clock text-gray-400"></i> <span id="reading-time-${art.id}">${art.readingTime}</span>
                                </span>
                            </span>
                            ${imageHtml}
                        </div>
                        <div class="pt-5 border-t border-gray-100 mt-2 flex justify-between items-center">
                            <a ${linkAction} class="text-xs text-brand-accent-blue font-extrabold uppercase tracking-widest flex items-center gap-1.5 hover:text-brand-accent-orange transition-colors font-inter">
                                Ler Artigo <i class="fas fa-chevron-right text-[10px] text-brand-accent-orange"></i>
                            </a>
                            <span class="text-[10px] text-gray-400 font-inter font-semibold">Escrito por HB</span>
                        </div>
                    </div>
                `;
            });
        }

        // Carrega assincronamente o HTML de cada artigo individual, calcula o número real de palavras e define o tempo real de leitura
        async function loadDynamicReadingTimes() {
            const prefix = getPrefix();
            const fetchPromises = articlesData.map(async (art) => {
                try {
                    // Requisita o arquivo de forma assíncrona
                    const path = getSafePath(prefix + art.url + '.html');
                    const response = await fetch(path);
                    if (!response.ok) return;

                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    const contentElement = doc.getElementById('article-content');
                    
                    if (contentElement) {
                        // Usamos textContent que é 100% consistente entre o DOM estático lido por fetch e o DOM vivo
                        const text = contentElement.textContent || contentElement.innerText || "";
                        const words = text.trim().split(/\s+/).filter(word => word.length > 0).length;
                        // Fórmula tradicional de legibilidade: ~200 palavras por minuto
                        const readingTimeValue = Math.ceil(words / 200);
                        
                        // Atualiza na base de dados em memória para ordenações e futuros filtros
                        art.readingTime = `${readingTimeValue} min`;
                        
                        // Atualiza diretamente no elemento visual correspondente sem necessidade de redesenhar a grelha toda
                        const timeSpan = document.getElementById(`reading-time-${art.id}`);
                        if (timeSpan) {
                            timeSpan.textContent = `${readingTimeValue} min`;
                        }
                    }
                } catch (e) {
                    console.warn(`Impossível calcular tempo de leitura real para o artigo ${art.id}:`, e);
                }
            });

            await Promise.all(fetchPromises);

            // Se o utilizador já tiver selecionado ordenação baseada em tempo de leitura, reordena os resultados reais
            const selectedSort = document.getElementById('sort-select').value;
            if (selectedSort === 'time-asc' || selectedSort === 'time-desc') {
                filterArticles();
            }
        }

        let toastTimeout;
        function triggerToastNotice() {
            const toast = document.getElementById('toast-notice');
            if (!toast) return;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        function clearFilters() {
            document.getElementById('article-search').value = '';
            document.getElementById('category-select').value = 'all';
            document.getElementById('sort-select').value = 'date-desc';
            filterArticles();
        }

        function getSafePath(file) {
            const currentUrl = window.location.href;
            if (currentUrl.startsWith('blob:') || currentUrl.startsWith('file:')) return file; 
            try { 
                const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                return new URL(file, baseUrl).href; 
            } catch (e) { return file; }
        }

        function getPrefix() {
            const path = window.location.pathname.toLowerCase();
            if (path.includes('/artigos/') || path.includes('/artigos-individuais/')) {
                return '../';
            }
            return '';
        }

        function adjustAndCleanLinks(placeholderId) {
            const container = document.getElementById(placeholderId);
            if (!container) return;
            const prefix = getPrefix();
            
            if (prefix !== '') {
                container.querySelectorAll('a').forEach(link => {
                    let href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('https') && !href.startsWith('/') && !href.startsWith('#') && !href.startsWith('javascript:')) {
                        if (!href.startsWith('../')) {
                            link.setAttribute('href', prefix + href);
                        }
                    }
                });
                container.querySelectorAll('img').forEach(img => {
                    let src = img.getAttribute('src');
                    if (src && !src.startsWith('http') && src.startsWith('Imagens/')) {
                        img.setAttribute('src', prefix + src);
                    }
                });
            }

            container.querySelectorAll('a').forEach(link => {
                let href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('https') && !href.startsWith('javascript:')) {
                    if (href.endsWith('.html')) {
                        link.setAttribute('href', href.slice(0, -5));
                    } else if (href.includes('.html?')) {
                        link.setAttribute('href', href.replace('.html?', '?'));
                    } else if (href.includes('.html#')) {
                        link.setAttribute('href', href.replace('.html#', '#'));
                    }
                }
            });
        }

        async function loadComponents() {
            const prefix = getPrefix();
            try {
                let navResp = await fetch(getSafePath(prefix + 'menu') + '?v=1.0.3');
                if (!navResp.ok) {
                    navResp = await fetch(getSafePath(prefix + 'menu.html') + '?v=1.0.3');
                }
                if (navResp.ok) {
                    document.getElementById('nav-placeholder').innerHTML = await navResp.text();
                    adjustAndCleanLinks('nav-placeholder');
                }

                let footResp = await fetch(getSafePath(prefix + 'rodape') + '?v=1.0.3');
                if (!footResp.ok) {
                    footResp = await fetch(getSafePath(prefix + 'rodape.html') + '?v=1.0.3');
                }
                if (footResp.ok) {
                    document.getElementById('footer-placeholder').innerHTML = await footResp.text();
                    adjustAndCleanLinks('footer-placeholder');
                }
                updateCartUI();

                // Cria o placeholder dinâmico para o popup no fim do body
                const popupPlaceholder = document.createElement('div');
                popupPlaceholder.id = 'newsletter-popup-placeholder';
                document.body.appendChild(popupPlaceholder);

                // Carrega o popup dinamicamente de forma centralizada
                let popupResp = await fetch(getSafePath(prefix + 'newsletter-popup') + '?v=1.0.0');
                if (!popupResp.ok) {
                    popupResp = await fetch(getSafePath(prefix + 'newsletter-popup.html') + '?v=1.0.0');
                }
                if (popupResp.ok) {
                    popupPlaceholder.innerHTML = await popupResp.text();
                    // Executa o script do popup que foi injetado
                    const script = popupPlaceholder.querySelector('script');
                    if (script) {
                        const newScript = document.createElement("script");
                        newScript.text = script.innerText;
                        document.body.appendChild(newScript);
                    }
                }
            } catch (e) { 
                console.warn("Modo offline."); 
            }
        }

        function updateCartUI() {
            const items = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const total = items.reduce((s, i) => s + i.quantity, 0);
            document.querySelectorAll('#cart-count, #cart-count-mobile').forEach(el => {
                if (el) { 
                    el.textContent = total; 
                    el.classList.toggle('opacity-0', total === 0); 
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
            filterArticles();
            loadDynamicReadingTimes();
        });
    </script>
</body>
</html>
